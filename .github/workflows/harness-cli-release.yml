name: Harness CLI Release

on:
  push:
    tags:
      - "harness-cli-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag to upload artifacts to"
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag to upload artifacts to"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to build. Defaults to the workflow ref."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt -p harness-cli -- --check

      - name: Run tests
        run: cargo test -p harness-cli --locked

      - name: Run clippy
        run: cargo clippy -p harness-cli --all-targets --locked -- -D warnings

      - name: Check shell scripts
        run: |
          bash -n scripts/install-harness.sh
          bash -n scripts/build-harness-cli-release.sh

  build:
    name: Build ${{ matrix.platform }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            target: aarch64-apple-darwin
            runner: macos-15
            binary: harness-cli-macos-arm64
          - platform: macos-x64
            target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: harness-cli-macos-x64
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            binary: harness-cli-linux-x64
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary: harness-cli-linux-arm64
          - platform: windows-x64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: harness-cli-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release artifact
        shell: bash
        run: scripts/build-harness-cli-release.sh --target "${{ matrix.target }}"

      - name: Smoke built CLI
        if: ${{ matrix.platform != 'windows-x64' }}
        shell: bash
        run: tests/protocol/smoke-native-artifact.sh "dist/${{ matrix.binary }}"

      - name: Smoke built CLI on Windows
        if: ${{ matrix.platform == 'windows-x64' }}
        shell: pwsh
        run: tests/protocol/smoke-native-artifact.ps1 -Artifact "dist/${{ matrix.binary }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness-cli-${{ matrix.platform }}
          path: |
            dist/${{ matrix.binary }}
            dist/${{ matrix.binary }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_tag != '' }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: harness-cli-*
          merge-multiple: true
          path: dist

      - name: Create release if needed
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "Harness CLI release $RELEASE_TAG"

      - name: Upload release assets
        run: gh release upload "$RELEASE_TAG" dist/harness-cli-* --repo "$GITHUB_REPOSITORY" --clobber
